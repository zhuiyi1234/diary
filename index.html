<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鲸语日记 - 极简极美版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        :root {
            --bg-base: #f9fbfa;
            --sea-ink: #1e293b;
            --sea-dust: #94a3b8;
            --morandi-blue: #bae6fd;
            --morandi-purple: #ddd6fe;
            --morandi-green: #bbf7d0;
            --morandi-orange: #fed7aa;
            --morandi-red: #fecaca;
        }

        body {
            background-color: var(--bg-base);
            color: var(--sea-ink);
            font-family: 'Noto Sans SC', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 440px;
            height: 100%;
            max-height: 900px;
            background: #ffffff;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 481px) {
            #app { height: 95vh; border-radius: 20px; border: 1px solid #edf2f0; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .minimal-title {
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.4em;
            text-indent: 0.4em;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .bubble-mine { background: var(--sea-ink); color: #fff; border-bottom-right-radius: 2px; align-self: flex-end; }
        .bubble-yours { background: #f1f5f9; color: #475569; border-bottom-left-radius: 2px; align-self: flex-start; }

        #custom-confirm {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .cal-cell-m {
            min-height: 95px;
            background: #fff;
            border: 0.5px solid #f8faf9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 8px 2px;
        }
        .cal-cell-m.today { background: #fcfdfd; border: 1px solid var(--sea-dust); }
        .cal-cell-m.future { opacity: 0.1; pointer-events: none; }

        .view-toggle {
            display: flex;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 2px;
        }
        .view-toggle button {
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            color: #94a3b8;
        }
        .view-toggle button.active { background: #fff; color: var(--sea-ink); }

        @keyframes whaleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .whale-float { animation: whaleFloat 5s ease-in-out infinite; }

        .summary-tag {
            font-size: 10px;
            color: var(--sea-dust);
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
            margin-top: 2px;
        }

        .check-btn-active {
            background: #f8fafc !important;
            border: 1px solid var(--sea-ink) !important;
            transform: scale(1.02);
        }

        .plan-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .plan-done { text-decoration: line-through; opacity: 0.3; }
        
        .icon-row {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 100%;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Header -->
    <div class="h-32 px-6 flex flex-col items-center justify-end shrink-0 z-40 relative pb-6 border-b border-gray-50">
        <div class="w-10 h-6 mb-2">
            <svg viewBox="0 0 40 20" fill="none">
                <path d="M5 15 Q20 0 35 15" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
                <circle cx="20" cy="8" r="2" fill="#bae6fd" class="animate-bounce"/>
            </svg>
        </div>
        <div class="minimal-title text-xl font-black">鲸语日记</div>
        <button id="btn-back" class="absolute top-10 left-6 w-8 h-8 flex items-center justify-center hidden active:opacity-50 transition"><svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg></button>
        <div id="whale-status-container" class="absolute top-10 right-6">
            <div id="whale-status-icon" class="w-12 h-12 flex items-center justify-center cursor-pointer whale-float"></div>
            <div id="whale-speech" class="absolute top-14 right-0 bg-white border border-gray-100 p-4 rounded-2xl shadow-2xl text-xs font-bold hidden z-50 min-w-[160px] leading-relaxed"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="flex-1 overflow-y-auto no-scrollbar px-6 py-6 z-10"></div>

    <!-- Custom Confirm -->
    <div id="custom-confirm">
        <div class="bg-white p-8 w-full max-w-xs text-center border border-gray-100 shadow-2xl rounded-3xl">
            <h3 id="confirm-title" class="font-bold text-base mb-2 text-slate-800">确认操作？</h3>
            <p id="confirm-body" class="text-xs text-slate-400 mb-8 leading-relaxed">每一个气泡都是珍贵的记忆 🫧</p>
            <div class="flex gap-4">
                <button onclick="closeConfirm()" class="flex-1 py-2 text-xs font-bold text-slate-300">取消</button>
                <button id="confirm-action-btn" class="flex-1 py-2 bg-slate-800 text-white rounded-lg text-xs font-bold">确定</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-overlay" class="fixed inset-0 bg-white/60 backdrop-blur-sm hidden z-50 flex flex-col justify-end">
    <div id="modal-container" class="bg-white border-t border-gray-100 p-10 w-full max-w-[440px] mx-auto shadow-2xl transition-transform transform translate-y-full rounded-t-[40px]"></div>
</div>

<script>
    // --- 极简豆豆眼鲸鱼素材库 (优化版) ---
    const WhaleSVG = {
        wrap: (content, cls = "") => `<svg viewBox="0 0 100 100" class="w-full h-full ${cls}">${content}</svg>`,
        body: (color = "#f1f5f9", mouth = "M42 68 Q50 71, 58 68") => `
            <path d="M20 60 C20 40, 80 40, 80 60 C80 75, 70 80, 50 80 C30 80, 20 75, 20 60" fill="${color}" stroke="#1e293b" stroke-width="1.2"/>
            <circle cx="35" cy="54" r="2.5" fill="#1e293b"/><circle cx="65" cy="54" r="2.5" fill="#1e293b"/>
            <path d="${mouth}" stroke="#1e293b" fill="none" stroke-width="3" stroke-linecap="round"/>
            <path d="M80 55 L90 50 L90 60 Z" fill="${color}" stroke="#1e293b" stroke-width="1.2"/>`,
        
        sleep: () => WhaleSVG.wrap(WhaleSVG.body("#bae6fd", "M42 65 L58 65")),
        happy: () => WhaleSVG.wrap(WhaleSVG.body("#bbf7d0", "M38 65 Q50 80, 62 65")),
        satisfied: () => WhaleSVG.wrap(WhaleSVG.body("#fecaca", "M42 68 L58 68")),
        bubble: () => WhaleSVG.wrap(WhaleSVG.body("#0ea5e9", "M40 68 Q50 80, 60 68")), // 右上角专供：明亮蓝
        
        // 业务图标 (特征强化)
        water: () => WhaleSVG.wrap(WhaleSVG.body("#e0f2fe", "M38 65 Q50 80, 62 65") + `<circle cx="50" cy="22" r="5" fill="#38bdf8"/>`), // 开心补水
        milkTea: () => WhaleSVG.wrap(WhaleSVG.body("#fed7aa", "M42 68 L58 68") + `<path d="M44 45 L56 45 L54 52 L46 52 Z" fill="#fff" stroke="#1e293b"/><path d="M50 40 L50 45" stroke="#1e293b" stroke-width="1.5"/>`), // 奶茶杯
        exercise: () => WhaleSVG.wrap(WhaleSVG.body("#bbf7d0") + `<path d="M15 40 L85 40" stroke="#1e293b" stroke-width="6"/><rect x="8" y="32" width="10" height="16" fill="#1e293b"/><rect x="82" y="32" width="10" height="16" fill="#1e293b"/>`), // 举铁
        sleepLog: () => WhaleSVG.wrap(WhaleSVG.body("#ddd6fe", "M45 65 L55 65") + `<path d="M55 25 Q65 25, 65 35" stroke="#a855f7" stroke-width="4" fill="none"/>`),
        mood: () => WhaleSVG.wrap(WhaleSVG.body("#fef9c3", "M38 65 Q50 80, 62 65")),

        // 负向
        noGym: () => WhaleSVG.wrap(WhaleSVG.body("#ddd6fe", "M42 66 L58 66") + `<path d="M72 35 L80 35 M72 42 L80 42" stroke="#a855f7" stroke-width="2"/>`),
        noMilk: () => WhaleSVG.wrap(WhaleSVG.body("#f8fafc", "M42 70 Q50 64, 58 70") + `<circle cx="50" cy="25" r="5" fill="#cbd5e1"/>`),
        
        // 心情
        mood_happy: () => WhaleSVG.wrap(WhaleSVG.body("#fbbf24", "M35 65 Q50 85, 65 65")),
        mood_sad: () => WhaleSVG.wrap(WhaleSVG.body("#94a3b8", "M40 75 Q50 65, 60 75")),
        mood_angry: () => WhaleSVG.wrap(WhaleSVG.body("#ef4444", "M40 70 L60 70") + `<path d="M30 45 L40 50 M70 45 L60 50" stroke="#fff" stroke-width="3"/>`)
    };

    // --- 数据持久化 ---
    const DB_KEY = 'WhaleDiary_Minimal_Final';
    let appData = JSON.parse(localStorage.getItem(DB_KEY)) || {
        plans: { yearly: [], monthly: [] },
        days: {},
        updates: { calendar: 0, checkin: 0, chat: 0, plans: 0 }
    };

    let state = { view: 'list', activeDate: getToday(), calMode: 'week', weekOffset: 0 };

    function getToday() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function getDay(date) { if (!appData.days[date]) appData.days[date] = { title: '', water: 0, milkTea: [], exercise: [], mood: null, sleep: null, chat: [] }; return appData.days[date]; }
    function markUpdate(m) { appData.updates[m] = Date.now(); save(); }
    function save() { localStorage.setItem(DB_KEY, JSON.stringify(appData)); updateHeaderWhale(); }

    function formatSocialTime(ts) {
        if (!ts) return "---";
        const date = new Date(ts);
        const now = new Date();
        if (date.toDateString() === now.toDateString()) return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
        if (date.toDateString() === yesterday.toDateString()) return "昨天";
        return `${date.getMonth()+1}月${date.getDate()}日`;
    }

    // --- 路由 ---
    function navigate(view, date = null) {
        state.view = view;
        if (date) state.activeDate = date;
        document.getElementById('btn-back').classList.toggle('hidden', view === 'list');
        const map = { list: renderHome, calendar: renderCalendarView, checkin: renderCheckin, chat: renderChat, plans: renderPlans };
        if(map[view]) map[view]();
        document.getElementById('main-content').scrollTop = 0;
    }
    document.getElementById('btn-back').onclick = () => navigate('list');

    // --- 首页 ---
    function renderHome() {
        const container = document.getElementById('main-content');
        const today = getDay(getToday());
        const lastChat = today.chat.length ? today.chat[today.chat.length-1].content : "在这里打捞回忆...";

        container.innerHTML = `
            <div class="space-y-6 pt-2">
                ${renderItem(WhaleSVG.sleep(), '时光鲸历', '回忆留下的轨迹', 'calendar', appData.updates.calendar)}
                ${renderItem(WhaleSVG.exercise(), '打卡管家', `今日饮水: ${today.water}ml`, 'checkin', appData.updates.checkin)}
                ${renderItem(WhaleSVG.bubble(), '心情树洞', lastChat, 'chat', appData.updates.chat, getToday())}
                ${renderItem(WhaleSVG.satisfied(), '愿望收集箱', '大海里的每一个约定', 'plans', appData.updates.plans)}
            </div>`;
    }

    function renderItem(svg, name, sub, view, ts, date = null) {
        return `<div class="flex items-center gap-5 cursor-pointer active:opacity-50 py-3" onclick="navigate('${view}', '${date}')"><div class="w-14 h-14 rounded-2xl flex items-center justify-center p-2 bg-slate-50 border border-gray-100">${svg}</div><div class="flex-1 border-b border-gray-50 pb-5 overflow-hidden"><div class="flex justify-between items-center mb-1"><span class="font-bold text-slate-800 text-base">${name}</span><span class="text-[10px] text-slate-300 font-bold">${formatSocialTime(ts)}</span></div><p class="text-xs text-slate-400 truncate">${sub}</p></div></div>`;
    }

    // --- 日历视图 ---
    function renderCalendarView() { state.calMode === 'week' ? renderWeekly() : renderMonthly(); }

    function renderMonthly() {
        const container = document.getElementById('main-content');
        const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
        const first = new Date(y, m, 1).getDay(); const days = new Date(y, m + 1, 0).getDate();
        const todayStr = getToday();

        let grid = '';
        const offset = first === 0 ? 6 : first - 1;
        for(let i=0; i<offset; i++) grid += `<div></div>`;
        for(let i=1; i<=days; i++) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const day = appData.days[dateStr];
            const isToday = dateStr === todayStr; const isFuture = dateStr > todayStr;
            let iconItems = [];
            if(day && !isFuture) {
                if(day.water > 0) iconItems.push(`<div class="w-4 h-4">${WhaleSVG.water()}</div>`);
                if(day.exercise?.length > 0) iconItems.push(`<div class="w-4 h-4">${WhaleSVG.exercise()}</div>`);
                if(day.milkTea?.length > 0) iconItems.push(`<div class="w-4 h-4">${WhaleSVG.milkTea()}</div>`);
                if(day.mood) iconItems.push(`<div class="w-4 h-4">${WhaleSVG['mood_'+day.mood] ? WhaleSVG['mood_'+day.mood]() : WhaleSVG.mood()}</div>`);
            }
            grid += `<div class="cal-cell-m active:opacity-50 transition-all ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}" onclick="!${isFuture} && navigate('chat', '${dateStr}')"><span class="font-bold text-[10px] ${isToday ? 'text-slate-900' : 'text-slate-300'}">${i}</span><div class="icon-row">${iconItems.join('')}</div><div class="summary-tag">${(!isFuture && day?.title) ? day.title : ''}</div></div>`;
        }

        container.innerHTML = `<div class="pt-2"><div class="flex justify-between items-center mb-8 px-1"><div class="view-toggle"><button class="${state.calMode==='week'?'active':''}" onclick="state.calMode='week';renderWeekly()">周</button><button class="${state.calMode==='month'?'active':''}" onclick="state.calMode='month';renderMonthly()">月</button></div><div class="font-bold text-sm text-slate-500">${y}年 ${m+1}月</div></div><div class="grid grid-cols-7 gap-px bg-gray-50 border border-gray-50 rounded-xl overflow-hidden mb-10">${grid}</div>${renderCalendarPlans()}</div>`;
    }

    function renderWeekly() {
        const container = document.getElementById('main-content');
        const now = new Date(); now.setDate(now.getDate() + (state.weekOffset * 7));
        const dayOfWeek = now.getDay(); const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
        const monday = new Date(now.setDate(diff)); const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
        const todayStr = getToday();

        let listHtml = '';
        for(let i=0; i<7; i++) {
            const current = new Date(monday); current.setDate(monday.getDate() + i);
            const dateStr = `${current.getFullYear()}-${String(current.getMonth()+1).padStart(2,'0')}-${String(current.getDate()).padStart(2,'0')}`;
            const day = appData.days[dateStr]; const isToday = dateStr === todayStr; const isFuture = dateStr > todayStr;
            
            let iconItems = [];
            if(!isFuture && day) {
                if(day.exercise?.length > 0) iconItems.push(`<div class="w-10 h-10">${WhaleSVG.exercise()}</div>`);
                else if(!isFuture) iconItems.push(`<div class="w-10 h-10">${WhaleSVG.noGym()}</div>`);
                if(day.milkTea?.length > 0) iconItems.push(`<div class="w-10 h-10">${WhaleSVG.milkTea()}</div>`);
                else if(!isFuture) iconItems.push(`<div class="w-10 h-10">${WhaleSVG.noMilk()}</div>`);
                if(day.water > 0) iconItems.push(`<div class="w-10 h-10">${WhaleSVG.water()}</div>`);
                if(day.mood) iconItems.push(`<div class="w-10 h-10">${WhaleSVG['mood_'+day.mood] ? WhaleSVG['mood_'+day.mood]() : WhaleSVG.mood()}</div>`);
            }

            listHtml += `<div class="flex items-center gap-4 py-4 border-b border-gray-50 ${isFuture ? 'opacity-20' : 'cursor-pointer active:opacity-50'}" onclick="!${isFuture} && navigate('chat', '${dateStr}')"><div class="w-10 text-center"><div class="text-[9px] font-bold text-slate-300 uppercase">${['一','二','三','四','五','六','日'][i]}</div><div class="text-base font-black ${isToday ? 'text-sky-500' : 'text-slate-700'}">${current.getDate()}</div></div><div class="flex flex-1 gap-2 items-center overflow-x-auto no-scrollbar">${iconItems.join('')}<div class="flex-1 text-xs font-bold text-slate-400 truncate ml-2">${isFuture ? '' : (day?.title || '这一天很安静')}</div></div></div>`;
        }

        container.innerHTML = `<div class="pt-2"><div class="flex justify-between items-center mb-6 px-1"><div class="view-toggle"><button class="${state.calMode==='week'?'active':''}" onclick="state.calMode='week';renderWeekly()">周</button><button class="${state.calMode==='month'?'active':''}" onclick="state.calMode='month';renderMonthly()">月</button></div><div class="flex items-center gap-1"><button onclick="state.weekOffset--;renderWeekly()" class="p-1 text-slate-300">←</button><span class="text-[11px] font-bold text-slate-400">${monday.getMonth()+1}.${monday.getDate()}-${sunday.getDate()}</span><button onclick="state.weekOffset++;renderWeekly()" class="p-1 text-slate-300">→</button></div></div><div class="mb-10">${listHtml}</div>${renderCalendarPlans()}</div>`;
    }

    function renderCalendarPlans() {
        const yList = appData.plans.yearly.filter(p=>!p.done).map(p=>`<li>· ${p.text}</li>`).join('') || "<li>· 风平浪静的海洋</li>";
        const mList = appData.plans.monthly.filter(p=>!p.done).map(p=>`<li>· ${p.text}</li>`).join('') || "<li>· 每一个自由的日子</li>";
        return `<div class="space-y-6 pt-6 border-t border-gray-50"><div><h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-3">藏在深海的大梦想</h4><ul class="text-xs font-bold text-slate-400 leading-relaxed">${yList}</ul></div><div><h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-3">这个月也要闪亮发光</h4><ul class="text-xs font-bold text-slate-400 leading-relaxed">${mList}</ul></div></div>`;
    }

    // --- 打卡管家 ---
    function renderCheckin() {
        const container = document.getElementById('main-content');
        const today = getDay(getToday());
        container.innerHTML = `<div class="flex flex-col h-full pt-2"><div class="flex-1 space-y-4 overflow-y-auto no-scrollbar pb-32" id="checkin-stream"><div class="text-center text-[11px] text-slate-200 tracking-widest font-black my-8 uppercase">捕捉到的生活碎片</div>${renderCheckinLog(today)}</div><div class="absolute bottom-10 left-6 right-6"><div class="h-20 bg-white border border-gray-100 rounded-2xl flex justify-around items-center px-4 shadow-xl shadow-slate-200/40">${['water','milkTea','exercise','sleepLog','mood'].map(t => `<button onclick="openForm('${t}')" class="w-10 h-10 flex items-center justify-center active:scale-90 transition"><div class="w-9 h-9">${WhaleSVG[t] ? WhaleSVG[t]() : WhaleSVG.mood()}</div></button>`).join('')}</div></div></div>`;
    }

    function renderCheckinLog(day) {
        let html = '';
        if(day.water > 0) html += renderLogItem(WhaleSVG.water(), `今日补水 ${day.water} ml`, 'water');
        day.milkTea.forEach((m, i) => html += renderLogItem(WhaleSVG.milkTea(), `${m.brand} (${m.sugar})`, 'milkTea', i));
        day.exercise.forEach((e, i) => html += renderLogItem(WhaleSVG.exercise(), `${e.parts.join('、')} · ${e.duration}m`, 'exercise', i));
        if(day.sleep) html += renderLogItem(WhaleSVG.sleepLog(), `${day.sleep.start} 入睡 · ${day.sleep.dur}h`, 'sleepLog');
        if(day.mood) html += renderLogItem(WhaleSVG['mood_'+day.mood] ? WhaleSVG['mood_'+day.mood]() : WhaleSVG.mood(), `此刻心情: ${day.mood}`, 'mood');
        return html || `<div class="text-center py-24 text-slate-200 text-xs font-bold italic">海面上一片宁静</div>`;
    }

    function renderLogItem(svg, text, type, index=null) {
        return `<div class="flex items-center gap-4 py-4 border-b border-gray-50 cursor-pointer active:opacity-50" onclick="showEditMenu('${type}', ${index})"><div class="w-10 h-10 shrink-0">${svg}</div><div class="flex-1 font-bold text-slate-600 text-sm">${text}</div><span class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">Edit</span></div>`;
    }

    function showEditMenu(type, index) {
        openConfirm("重新打磨这块碎片？", "要把这一条记录重新扔回深海吗？🐳", () => {
            const day = getDay(getToday());
            if(type === 'water') day.water = 0; else if(type === 'sleepLog') day.sleep = null; else if(type === 'mood') day.mood = null; else day[type].splice(index, 1);
            markUpdate('checkin'); renderCheckin();
        });
    }

    // --- 表单录入 (修复逻辑) ---
    let selections = {};
    function openForm(type) {
        const container = document.getElementById('modal-container');
        let html = ''; selections = {};
        if(type === 'water') html = `<h3 class="font-black text-center text-sm mb-6 text-slate-400">补水录入 (ml)</h3><input type="number" id="f-water" class="w-full p-4 bg-slate-50 rounded-xl mb-8 outline-none text-center text-4xl font-black text-slate-600" placeholder="250"><button onclick="submitCheckin('water')" class="w-full py-4 bg-slate-800 text-white rounded-xl font-bold">记录</button>`;
        else if(type === 'milkTea') html = `<h3 class="font-black text-center text-sm mb-6 text-slate-400">发现一杯快乐</h3><input type="text" id="f-brand" class="w-full p-4 bg-slate-50 rounded-xl mb-6 outline-none font-bold text-center" placeholder="哪个牌子？"><div class="grid grid-cols-5 gap-2 mb-8">${['无糖','三分','五分','七分','全糖'].map(s=>`<button class="p-2 bg-slate-50 rounded-lg text-[10px] font-bold" onclick="selectOpt(this, 'sugar', '${s}')">${s}</button>`).join('')}</div><button onclick="submitCheckin('milkTea')" class="w-full py-4 bg-slate-800 text-white rounded-xl font-bold">记录</button>`;
        else if(type === 'exercise') html = `<h3 class="font-black text-center text-sm mb-6 text-slate-400">汗水记录 (min)</h3><input type="number" id="f-dur" class="w-full p-4 bg-slate-50 rounded-xl mb-6 outline-none font-black text-center text-2xl" placeholder="30"><div class="grid grid-cols-3 gap-3 mb-10">${['练肩','练腿','练胸','练背','有氧','核心'].map(p=>`<button class="p-3 bg-slate-50 rounded-xl text-[10px] font-bold border border-transparent" onclick="toggleMultiOpt(this, 'parts', '${p}')">${p}</button>`).join('')}</div><button onclick="submitCheckin('exercise')" class="w-full py-4 bg-slate-800 text-white rounded-xl font-bold">坚持</button>`;
        else if(type === 'sleepLog') html = `<h3 class="font-black text-center text-sm mb-6 text-slate-400">进入梦乡</h3><div class="flex gap-4 mb-10"><div><label class="text-[9px] block text-center font-black uppercase mb-1">时刻</label><input type="time" id="f-start" class="w-full p-4 bg-slate-50 rounded-xl font-black" value="23:30"></div><div><label class="text-[9px] block text-center font-black uppercase mb-1">时长(h)</label><input type="number" step="0.5" id="f-dur-h" class="w-full p-4 bg-slate-50 rounded-xl font-bold" placeholder="8"></div></div><button onclick="submitCheckin('sleepLog')" class="w-full py-4 bg-slate-800 text-white rounded-xl font-bold">记录</button>`;
        else if(type === 'mood') html = `<h3 class="font-black text-center text-sm mb-10 text-slate-400">此刻心情是一只...</h3><div class="grid grid-cols-3 gap-8 mb-10">${[['happy','开心'],['sad','忧郁'],['angry','火大']].map(([k,v])=>`<div class="flex flex-col items-center gap-3 cursor-pointer active:opacity-50" onclick="submitCheckin('mood', '${v}')"><div class="w-14 h-14">${WhaleSVG['mood_'+k]()}</div><span class="text-[10px] font-bold text-slate-400">${v}</span></div>`).join('')}</div>`;
        
        container.innerHTML = html; document.getElementById('modal-overlay').classList.remove('hidden');
        setTimeout(() => container.classList.remove('translate-y-full'), 10);
    }
    
    function selectOpt(b, t, v) { Array.from(b.parentElement.children).forEach(x => x.classList.remove('check-btn-active')); b.classList.add('check-btn-active'); selections[t] = v; }
    function toggleMultiOpt(b, t, v) { if(!selections[t]) selections[t]=[]; if(selections[t].includes(v)){ selections[t]=selections[t].filter(x=>x!==v); b.classList.remove('check-btn-active'); } else { selections[t].push(v); b.classList.add('check-btn-active'); } }
    
    function submitCheckin(t, v=null) {
        const d = getDay(getToday());
        if(t==='water') d.water+=(parseInt(document.getElementById('f-water').value)||250);
        else if(t==='milkTea') d.milkTea.push({brand:document.getElementById('f-brand').value||'快乐水', sugar:selections.sugar||'五分糖'});
        else if(t==='exercise') d.exercise.push({duration:parseInt(document.getElementById('f-dur').value)||30, parts:selections.parts||['潜水']});
        else if(t==='sleepLog') d.sleep={start:document.getElementById('f-start').value, dur:parseFloat(document.getElementById('f-dur-h').value)||8};
        else if(t==='mood') d.mood=v;
        markUpdate('checkin'); markUpdate('calendar'); closeModal(); navigate(state.view);
    }
    function closeModal() { const c=document.getElementById('modal-container'); if(c) c.classList.add('translate-y-full'); setTimeout(()=>document.getElementById('modal-overlay').classList.add('hidden'), 300); }

    // --- 树洞 ---
    function renderChat() {
        const container = document.getElementById('main-content');
        const day = getDay(state.activeDate); const isToday = state.activeDate === getToday();
        container.innerHTML = `
            <div class="flex flex-col h-full">
                <input type="text" value="${day.title || ''}" placeholder="--- 给这一天起个名 ---" class="bg-transparent text-center text-xs font-bold text-slate-300 outline-none mb-8" onblur="getDay('${state.activeDate}').title=this.value; markUpdate('chat'); save();">
                <div class="flex-1 space-y-6 overflow-y-auto no-scrollbar py-2" id="chat-stream">
                    ${day.chat.map((m, i) => `<div class="flex flex-col items-end gap-1 mb-4"><div class="bubble bubble-mine font-bold shadow-sm overflow-hidden" onclick="showRecallConfirm(this, ${i})">${m.content}</div><span class="text-[9px] text-slate-300 font-bold uppercase mr-1">${m.time} · 撤回</span></div>`).join('')}
                </div>
                ${isToday ? `<div class="p-6 bg-white border-t border-gray-100 mt-4 flex items-center gap-4"><textarea id="chat-input" placeholder="捕捉此刻的想法..." class="flex-1 bg-transparent border-none outline-none text-sm py-1 max-h-24 resize-none font-bold text-slate-700" rows="1"></textarea><button onclick="sendChat()" class="w-12 h-12 bg-slate-800 text-white rounded-lg font-black text-xl active:scale-90 transition">✓</button></div>` : ''}
            </div>`;
        setTimeout(() => { const s = document.getElementById('chat-stream'); if(s) s.scrollTop = s.scrollHeight; }, 100);
    }
    function showRecallConfirm(el, i) { openConfirm("撤回消息？", "捏碎这颗泡泡吗？🫧", () => { getDay(state.activeDate).chat.splice(i, 1); markUpdate('chat'); renderChat(); }); }
    function sendChat() {
        const input = document.getElementById('chat-input'); if(!input?.value.trim()) return;
        const d = getDay(getToday()); const now = new Date(); const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        d.chat.push({ type: 'text', content: input.value.trim(), time: timeStr }); input.value = '';
        markUpdate('chat'); renderChat();
    }

    // --- 愿望清单 ---
    function renderPlans() {
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div class="pt-2 space-y-12 pb-16">
                <div class="text-center"><h2 class="text-2xl font-black minimal-title text-slate-800">约定清单</h2></div>
                <section class="space-y-6">
                    <div class="text-[10px] font-black text-slate-300 uppercase px-2 tracking-[0.3em]">藏在深海的大梦想</div>
                    <div class="bg-slate-50 p-3 rounded-xl flex gap-2"><input type="text" id="add-y" placeholder="新增一个梦想..." class="flex-1 bg-transparent border-none outline-none font-bold text-xs text-slate-500 px-2"><button onclick="addTask('yearly')" class="w-10 h-10 bg-slate-800 text-white rounded-lg font-black">+</button></div>
                    <div class="space-y-2">${renderTaskItems('yearly')}</div>
                </section>
                <section class="space-y-6">
                    <div class="text-[10px] font-black text-slate-300 uppercase px-2 tracking-[0.3em]">这个月也要闪闪发光</div>
                    <div class="bg-slate-50 p-3 rounded-xl flex gap-2"><input type="text" id="add-m" placeholder="坚持一桩小事..." class="flex-1 bg-transparent border-none outline-none font-bold text-xs text-slate-500 px-2"><button onclick="addTask('monthly')" class="w-10 h-10 bg-slate-800 text-white rounded-lg font-black">+</button></div>
                    <div class="space-y-2">${renderTaskItems('monthly')}</div>
                </section>
                
                <div class="pt-10 border-t border-gray-50 flex gap-4">
                    <button onclick="exportData()" class="flex-1 py-3 border border-gray-100 rounded-xl text-[10px] font-bold text-slate-300">导出数据备份</button>
                    <label class="flex-1 py-3 border border-gray-100 rounded-xl text-[10px] font-bold text-slate-300 text-center cursor-pointer">导入数据还原<input type="file" class="hidden" onchange="importData(this)"></label>
                </div>
            </div>`;
    }
    function renderTaskItems(t) { return appData.plans[t].map(k => `<div class="plan-item group ${k.done ? 'plan-done' : ''}"><div onclick="toggleT('${t}', ${k.id})" class="w-6 h-6 rounded-md border-2 border-gray-100 bg-white flex items-center justify-center cursor-pointer active:opacity-50 transition">${k.done ? `<div class="w-3 h-3 bg-slate-800 rounded-sm"></div>` : ''}</div><div class="flex-1 text-sm font-bold text-slate-600">${k.text}</div><button onclick="delT('${t}', ${k.id})" class="text-slate-200 hover:text-red-400 font-bold opacity-0 group-hover:opacity-100 transition-opacity">×</button></div>`).join('') || '<div class="text-center py-6 text-slate-200 text-xs font-black">海面上风平浪静</div>'; }
    function addTask(t) { const el = document.getElementById(`add-${t==='yearly'?'y':'m'}`); if(!el.value.trim()) return; appData.plans[t].push({ id:Date.now(), text:el.value.trim(), done:false }); el.value=''; markUpdate('plans'); renderPlans(); }
    function toggleT(t, i) { const k = appData.plans[t].find(x=>x.id===i); if(k){ k.done=!k.done; markUpdate('plans'); renderPlans(); } }
    function delT(t, i) { openConfirm("放弃约定？", "要让这个泡泡沉入深海吗？🐳", () => { appData.plans[t]=appData.plans[t].filter(x=>x.id!==i); markUpdate('plans'); renderPlans(); }); }

    // --- 备份与恢复 ---
    function exportData() {
        const blob = new Blob([JSON.stringify(appData)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `鲸语日记备份_${new Date().toLocaleDateString()}.json`; a.click();
    }
    function importData(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(confirm("导入将覆盖当前所有数据，确定吗？")) { appData = data; save(); location.reload(); }
                } catch(err) { alert("文件格式不对哦 🐳"); }
            }; reader.readAsDataURL(input.files[0]);
        }
    }

    // --- 确认逻辑 ---
    function openConfirm(t, b, a) { document.getElementById('confirm-title').innerText=t; document.getElementById('confirm-body').innerText=b; document.getElementById('custom-confirm').style.display='flex'; document.getElementById('confirm-action-btn').onclick=()=>{a();closeConfirm();}; }
    function closeConfirm() { document.getElementById('custom-confirm').style.display='none'; }
    function updateHeaderWhale() {
        const icon = document.getElementById('whale-status-icon'); const day = getDay(getToday()); let type = 'bubble';
        if(day.water >= 1500 && day.exercise.length > 0) type = 'happy'; else if(day.milkTea.length > 0) type = 'satisfied'; else if(day.chat.length > 0) type = 'sleep';
        icon.innerHTML = `<div class="w-full h-full">${WhaleSVG.bubble()}</div>`; // 强制蓝色
        icon.onclick = () => {
            const box = document.getElementById('whale-speech'); let msgs = ["我在深海为你守护秘密 🫧", "今天也要闪闪发光哦。", "咕噜咕噜，吐个泡泡给你。"];
            if (day.water >= 2000) msgs.push("2000ml补水达成！你现在的身体水灵灵的~");
            box.innerText = msgs[Math.floor(Math.random() * msgs.length)]; box.style.display = 'block'; setTimeout(() => { box.style.display = 'none'; }, 3000);
        };
    }

    save(); navigate('list');
</script>
</body>
</html>
